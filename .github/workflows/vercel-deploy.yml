name: Vercel Deploy

# [1] main 브랜치에 push되면 Vercel 운영 배포 workflow를 실행합니다.
on:
  push:
    branches:
      - main

# [2] Vercel CLI가 프로젝트를 식별하기 위해 사용하는 GitHub Secrets입니다.
#     실제 값은 repository settings > Secrets and variables에서 관리합니다.
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    # [3] GitHub-hosted Ubuntu runner에서 배포 작업을 실행합니다.
    runs-on: ubuntu-latest
    steps:
      # [4] 저장소 코드를 runner로 체크아웃합니다.
      - name: "[1] Checkout repository"
        uses: actions/checkout@v4

      # [5] Vercel 배포 명령을 실행하기 위해 최신 Vercel CLI를 설치합니다.
      - name: "[2] Install Vercel CLI"
        run: npm install -g vercel@latest

      # [6] main 브랜치 push이므로 --prod 옵션으로 Vercel Production에 배포합니다.
      #     Vercel 내부에서 프로젝트 설정에 따라 install/build/deploy가 수행됩니다.
      - name: "[3] Deploy to Vercel Production"
        run: vercel deploy ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
