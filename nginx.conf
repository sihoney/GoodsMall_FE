server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA 라우팅 지원
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 빌드된 정적 asset은 장기 캐싱
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
